<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Forest of Logic – The Resolution Mystery</title>

<style>
body{
margin:0;
font-family:'Times New Roman', serif;
color:white;
text-align:center;
}

/* 🌲 MAIN BACKGROUND */
.forest{
background:url("./title_image.jpg") no-repeat center center;
background-size:cover;
}

/* 🎬 INTRO FIXED FULL SCREEN */
.introbg{
background:url("./forest_intro.jpg") no-repeat center center;
background-size:cover;
}

/* OVERLAY */
.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:-1;
}

.container{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

input{padding:10px;}

.question{
font-size:30px;
color:#FFD700;
max-width:800px;
}

.button{
padding:12px 25px;
margin:10px;
background:#2e8b57;
border:none;
color:white;
cursor:pointer;
}

.hidden{display:none;}

table{
border-collapse:collapse;
width:70%;
margin:auto;
}

th,td{
border:1px solid white;
padding:10px;
}

#topbar{
position:fixed;
top:10px;
left:10px;
}

#sideBtn{
position:fixed;
top:10px;
right:10px;
background:orange;
padding:10px;
}

.current{
background:rgba(255,255,255,0.2);
}
</style>
</head>

<body class="forest">

<div class="overlay"></div>

<div id="topbar">⭐ 0 | ⏱ 0s</div>
<button id="sideBtn" onclick="showParticipants()">📋 Participants</button>

<!-- HOME -->
<div id="home" class="container">
<h1>🌲 Forest of Logic – The Resolution Mystery</h1>
<button class="button" onclick="goToEnter()">Start</button>
</div>

<!-- ENTER -->
<div id="enter" class="container hidden">
<h2>Enter Your Name</h2>
<input id="nameInput">
<button class="button" onclick="startGame()">Continue</button>
</div>

<!-- INTRO -->
<div id="intro" class="container hidden">
<h2>Alex is found dead in the forest</h2>
<p>Only Conrad and Belly were present</p>
<button class="button" onclick="startQuiz()">Begin Investigation</button>
</div>

<!-- GAME -->
<div id="game" class="container hidden">
<div id="q" class="question"></div>
<button class="button" onclick="check(true)">True</button>
<button class="button" onclick="check(false)">False</button>
</div>

<!-- RESULT -->
<div id="result" class="container hidden">
<h2 id="res"></h2>
<h3 id="fun"></h3>
<button class="button" onclick="next()">Next</button>
</div>

<!-- FINAL -->
<div id="final" class="container hidden">
<h2 id="scoreText"></h2>
</div>

<!-- LEADERBOARD -->
<div id="leader" class="container hidden">
<h2>🏆 Leaderboard</h2>
<table id="table"></table>
<button class="button" onclick="goHome()">🏠 Home</button>
</div>

<!-- PARTICIPANTS -->
<div id="participants" class="container hidden">
<h2>📋 Participants</h2>
<table id="pTable"></table>
<button class="button" onclick="goHome()">🏠 Home</button>
</div>

<script>

let player="",score=0,time=0,qn=0,timer;
let board=[];

/* SAME QUESTIONS */
const questions=[
{q:"If Conrad has no mud, he cannot be the killer.",a:true},
{q:"Belly can be guilty without mud.",a:false},
{q:"If Conrad alone has mud, he is guilty.",a:true},
{q:"Belly without mud can still be guilty.",a:false},
{q:"If Conrad satisfies all conditions, he is guilty.",a:true},
{q:"Someone must be guilty without evidence.",a:false}
];

/* 💬 COMMENTS ADDED */
const funComments=[
"😎 Smart move!",
"😂 That was tricky!",
"🔥 You're on fire!",
"🤔 Think deeper!",
"🎯 Sharp thinking!",
"😅 Almost there!"
];

function hideAll(){
document.querySelectorAll(".container").forEach(d=>d.classList.add("hidden"));
}

function goToEnter(){
hideAll();
document.getElementById("enter").classList.remove("hidden");
}

function goHome(){
hideAll();
document.body.className="forest";
document.getElementById("home").classList.remove("hidden");
}

/* START */
function startGame(){
let input=document.getElementById("nameInput").value;

if(!input || input.trim()==""){
alert("Enter name");
return;
}

player=input.trim();

/* 🔥 SHOW INTRO IMAGE */
document.body.className="introbg";

hideAll();
document.getElementById("intro").classList.remove("hidden");
}

/* QUIZ */
function startQuiz(){
document.body.className="forest";

hideAll();
document.getElementById("game").classList.remove("hidden");

timer=setInterval(()=>{
time++;
updateTop();
},1000);

load();
}

function updateTop(){
document.getElementById("topbar").innerText=
"⭐ "+score+" | ⏱ "+time+"s";
}

function load(){
document.getElementById("q").innerText=questions[qn].q;
}

function check(a){
if(a===questions[qn].a)score++;

updateTop();

hideAll();
document.getElementById("result").classList.remove("hidden");

document.getElementById("res").innerText=
a===questions[qn].a?"Correct":"Wrong";

/* 💬 SHOW COMMENT */
document.getElementById("fun").innerText=
funComments[Math.floor(Math.random()*6)];
}

function next(){
qn++;

if(qn>=questions.length){
finish();
return;
}

hideAll();
document.getElementById("game").classList.remove("hidden");
load();
}

/* FINAL */
function finish(){
clearInterval(timer);

hideAll();
document.getElementById("final").classList.remove("hidden");

document.getElementById("scoreText").innerText=
"🎯 "+player+" scored "+score+" / 6";

/* SAVE */
board.push({name:player,score:score,time:time});

setTimeout(showLeaderboard,2000);
}

/* LEADERBOARD */
function showLeaderboard(){
hideAll();
document.getElementById("leader").classList.remove("hidden");

let t=document.getElementById("table");

t.innerHTML="<tr><th>Rank</th><th>Name</th><th>Score</th><th>Time</th></tr>";

board.sort((a,b)=>b.score-a.score||a.time-b.time);

board.forEach((p,i)=>{
let row=document.createElement("tr");

if(p.name===player){
row.className="current";
}

row.innerHTML=`
<td>${i+1}</td>
<td>${p.name}</td>
<td>${p.score}</td>
<td>${p.time}s</td>
`;

t.appendChild(row);
});
}

function showParticipants(){
hideAll();
document.getElementById("participants").classList.remove("hidden");

let t=document.getElementById("pTable");

t.innerHTML="<tr><th>Name</th><th>Score</th></tr>";

board.forEach(p=>{
t.innerHTML+=`<tr><td>${p.name}</td><td>${p.score}</td></tr>`;
});
}

</script>

</body>
</html>
